<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>GETEC Frota — Redefinir senha</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20260707">
</head>
<body>
  <main class="card">
    <h1>Redefinir senha</h1>
    <p class="subtitle">Escolha uma nova senha para sua conta.</p>

    <form id="reset-form" novalidate>
      <label for="senha">Nova senha</label>
      <div class="password-field">
        <input id="senha" type="password" autocomplete="new-password" required>
        <span class="toggle-senha" onclick="toggleSenha(this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
      </div>

      <label for="senha2">Repita a nova senha</label>
      <div class="password-field">
        <input id="senha2" type="password" autocomplete="new-password" required>
        <span class="toggle-senha" onclick="toggleSenha(this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
      </div>

      <button id="submit" type="submit">Salvar nova senha</button>
    </form>

    <div id="msg" class="msg"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/password-toggle.js"></script>
  <script>
    const form = document.getElementById('reset-form');
    const senhaEl = document.getElementById('senha');
    const senha2El = document.getElementById('senha2');
    const submitBtn = document.getElementById('submit');
    const msg = document.getElementById('msg');

    function show(text, kind) {
      msg.textContent = text;
      msg.className = 'msg show ' + kind;
    }
    function clearMsg() { msg.className = 'msg'; }

    // The recovery link carries a token in the URL hash; supabase-js reads it
    // and creates a temporary session. If there is no session, the link is
    // invalid or expired.
    let hasRecoverySession = false;
    supabaseClient.auth.getSession().then(({ data }) => {
      hasRecoverySession = !!data.session;
      if (!hasRecoverySession) {
        show('Link inválido ou expirado. Peça um novo em "Esqueci minha senha".', 'error');
        submitBtn.disabled = true;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMsg();
      const senha = senhaEl.value;
      const senha2 = senha2El.value;
      if (senha.length < 6) {
        show('A senha precisa ter pelo menos 6 caracteres.', 'error');
        return;
      }
      if (senha !== senha2) {
        show('As duas senhas não são iguais.', 'error');
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Salvando…';
      const { error } = await supabaseClient.auth.updateUser({ password: senha });
      if (error) {
        show(authErrorMessage(error), 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Salvar nova senha';
        return;
      }
      show('Senha atualizada. Redirecionando para o login…', 'ok');
      setTimeout(() => location.replace('index.html'), 1500);
    });
  </script>
</body>
</html>
